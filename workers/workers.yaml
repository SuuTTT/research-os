  - worker_id: vastai_worker_3
    kind: ssh
    enabled: true
    worker_pool: vastai
    ssh:
      host: ssh4.vast.ai
      port: 22607
      user: root
      key: ~/.ssh/vastai_id_ed25519
    workspace: /root/research-worker
    runner:
      type: bash
      docker_image: ""
    resources:
      cpu: 20
      gpu: 2
      vram_gb: 12          # 2× GTX 1660 Super, 6 GB each
      disk_gb: 120
      reliability_pct: 90
    network:
      restricted: false
      bandwidth_mbps_up: 35.2
      bandwidth_mbps_down: 545.2
